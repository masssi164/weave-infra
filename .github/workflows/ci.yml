name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      weave_backend_image:
        description: "Backend image to validate in the smoke stack"
        required: false
        default: "weave-backend:smoke-ci"
      weave_backend_ref:
        description: "Git ref to use when building the smoke-test backend image"
        required: false
        default: "main"

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEAVE_BACKEND_IMAGE: ${{ github.event.inputs.weave_backend_image || 'weave-backend:smoke-ci' }}
  REQUESTED_WEAVE_BACKEND_REF: ${{ github.event.inputs.weave_backend_ref || github.head_ref || github.ref_name || 'main' }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate:
    name: Validate Stack
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Install repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq shellcheck

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive weave-workspace

      - name: Initialize and validate infrastructure stage
        run: |
          terraform -chdir=weave-workspace/01-infrastructure init -backend=false -input=false
          terraform -chdir=weave-workspace/01-infrastructure validate

      - name: Initialize and validate Keycloak setup stage
        run: |
          terraform -chdir=weave-workspace/02-keycloak-setup init -backend=false -input=false
          terraform -chdir=weave-workspace/02-keycloak-setup validate

      - name: Lint bootstrap and smoke scripts
        run: |
          bash -n weave-workspace/install.sh
          bash -n weave-workspace/smoke-test.sh
          shellcheck weave-workspace/install.sh weave-workspace/smoke-test.sh

  smoke:
    name: Full Stack Smoke
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Install smoke-test tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq

      - name: Resolve backend ref
        id: backend_ref
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads https://github.com/masssi164/weave-backend.git "${REQUESTED_WEAVE_BACKEND_REF}" >/dev/null 2>&1; then
            backend_ref="${REQUESTED_WEAVE_BACKEND_REF}"
          else
            backend_ref="main"
          fi

          echo "ref=${backend_ref}" >> "$GITHUB_OUTPUT"
          echo "Using weave-backend ref: ${backend_ref}"

      - name: Check out backend repository
        uses: actions/checkout@v6
        with:
          repository: masssi164/weave-backend
          ref: ${{ steps.backend_ref.outputs.ref }}
          path: weave-backend

      - name: Build backend image for smoke stack
        run: docker build -t "${WEAVE_BACKEND_IMAGE}" weave-backend

      - name: Bootstrap the local stack with a smoke-test user
        env:
          TF_VAR_create_test_user: "true"
          TF_VAR_weave_backend_image: ${{ env.WEAVE_BACKEND_IMAGE }}
        run: bash weave-workspace/install.sh

      - name: Run full-stack smoke validation
        env:
          TF_VAR_weave_backend_image: ${{ env.WEAVE_BACKEND_IMAGE }}
        run: bash weave-workspace/smoke-test.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker ps -a
          for container in weave-proxy weave-keycloak weave-backend weave-mas weave-synapse weave-nextcloud weave-db; do
            echo "--- ${container}"
            docker logs "${container}" || true
          done

      - name: Destroy stack
        if: always()
        run: |
          source weave-workspace/.generated/bootstrap.env || true
          terraform -chdir=weave-workspace/02-keycloak-setup destroy -refresh=false -input=false -auto-approve || true
          terraform -chdir=weave-workspace/01-infrastructure destroy -refresh=false -input=false -auto-approve || true
