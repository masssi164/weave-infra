name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_power_budget_ok:
        description: "Manual gate: confirm solar/storage/power budget is acceptable for full-stack smoke"
        required: true
        type: boolean
        default: false
      weave_backend_image:
        description: "Backend image to validate in the smoke stack"
        required: false
        default: "weave-backend:smoke-ci"
      weave_backend_ref:
        description: "Git ref to use when building the smoke-test backend image"
        required: false
        default: "main"
      run_restore_smoke:
        description: "Also create private backup artifacts and run restore-smoke as Release 1 recovery evidence"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEAVE_BACKEND_IMAGE: ${{ github.event.inputs.weave_backend_image || 'weave-backend:smoke-ci' }}
  REQUESTED_WEAVE_BACKEND_REF: ${{ github.event.inputs.weave_backend_ref || github.head_ref || github.ref_name || 'main' }}
  DOCKER_BUILDKIT: '1'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Stack
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Install repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq shellcheck

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive weave-workspace

      - name: Initialize and validate infrastructure stage
        run: |
          terraform -chdir=weave-workspace/01-infrastructure init -backend=false -input=false
          terraform -chdir=weave-workspace/01-infrastructure validate

      - name: Initialize and validate Keycloak setup stage
        run: |
          terraform -chdir=weave-workspace/02-keycloak-setup init -backend=false -input=false
          terraform -chdir=weave-workspace/02-keycloak-setup validate

      - name: Lint bootstrap, teardown, and smoke scripts
        run: |
          bash -n weave-workspace/install.sh
          bash -n weave-workspace/teardown.sh
          bash -n weave-workspace/smoke-test.sh
          bash -n weave-workspace/provision-matrix-default-workspace.sh
          bash -n weave-workspace/support-bundle.sh
          bash -n weave-workspace/backup.sh
          bash -n weave-workspace/restore-smoke.sh
          bash -n weave-workspace/activate-user.sh
          bash -n weave-workspace/tests/teardown-guard-test.sh
          bash -n weave-workspace/tests/support-bundle-redaction-test.sh
          bash -n weave-workspace/tests/restore-smoke-artifacts-test.sh
          bash -n weave-workspace/tests/matrix-provisioning-mas-cli-test.sh
          bash -n weave-workspace/tests/activate-user-helper-test.sh
          shellcheck weave-workspace/install.sh weave-workspace/teardown.sh weave-workspace/smoke-test.sh weave-workspace/provision-matrix-default-workspace.sh weave-workspace/support-bundle.sh weave-workspace/backup.sh weave-workspace/restore-smoke.sh weave-workspace/activate-user.sh weave-workspace/tests/teardown-guard-test.sh weave-workspace/tests/support-bundle-redaction-test.sh weave-workspace/tests/restore-smoke-artifacts-test.sh weave-workspace/tests/matrix-provisioning-mas-cli-test.sh weave-workspace/tests/activate-user-helper-test.sh

      - name: Test destructive reset guardrails
        run: bash weave-workspace/tests/teardown-guard-test.sh

      - name: Test support bundle redaction
        run: bash weave-workspace/tests/support-bundle-redaction-test.sh

      - name: Test restore-smoke artifact preflight
        run: bash weave-workspace/tests/restore-smoke-artifacts-test.sh

      - name: Test Matrix provisioning uses MAS CLI
        run: bash weave-workspace/tests/matrix-provisioning-mas-cli-test.sh

      - name: Test admin user activation helper
        run: bash weave-workspace/tests/activate-user-helper-test.sh

  smoke:
    name: Manual Full Stack Smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_power_budget_ok == true }}
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    env:
      WEAVE_REMOVE_VOLUMES: 'true'
      WEAVE_CONFIRM_DESTRUCTIVE_RESET: weave

    defaults:
      run:
        shell: bash

    steps:
      - name: Confirm manual power/storage gate
        run: |
          echo "Manual full-stack smoke gate accepted by workflow dispatcher."
          echo "Optional future improvement: query Home Assistant solar/storage sensors before this point; no HA secrets are assumed here."

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Install smoke-test tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq

      - name: Resolve backend ref
        id: backend_ref
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads https://github.com/masssi164/weave-backend.git "${REQUESTED_WEAVE_BACKEND_REF}" >/dev/null 2>&1; then
            backend_ref="${REQUESTED_WEAVE_BACKEND_REF}"
          else
            backend_ref="main"
          fi

          echo "ref=${backend_ref}" >> "$GITHUB_OUTPUT"
          echo "Using weave-backend ref: ${backend_ref}"

      - name: Check out backend repository
        uses: actions/checkout@v6
        with:
          repository: masssi164/weave-backend
          ref: ${{ steps.backend_ref.outputs.ref }}
          path: weave-backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for smoke stack
        run: docker buildx build --load -t "${WEAVE_BACKEND_IMAGE}" weave-backend

      - name: Bootstrap the local stack with a smoke-test user
        env:
          TF_VAR_create_test_user: "true"
          TF_VAR_weave_backend_image: ${{ env.WEAVE_BACKEND_IMAGE }}
        run: bash weave-workspace/install.sh

      - name: Run full-stack smoke validation
        env:
          TF_VAR_weave_backend_image: ${{ env.WEAVE_BACKEND_IMAGE }}
        run: bash weave-workspace/smoke-test.sh

      - name: Create private backup artifacts for restore-smoke
        if: ${{ inputs.run_restore_smoke == true }}
        env:
          WEAVE_BACKUP_DIR: ${{ runner.temp }}/weave-restore-rehearsal-backups
        run: |
          bash weave-workspace/backup.sh
          backup_dir="$(find "${WEAVE_BACKUP_DIR}" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          echo "WEAVE_RESTORE_SMOKE_BACKUP_DIR=${backup_dir}" >> "$GITHUB_ENV"
          echo "Created private backup artifact set for restore-smoke at ${backup_dir}"
          echo "Backup artifacts contain secrets and are intentionally not uploaded."

      - name: Run restore-smoke recovery readiness gate
        if: ${{ inputs.run_restore_smoke == true }}
        env:
          WEAVE_RESTORE_SMOKE_REPROVISION_MATRIX: "true"
        run: bash weave-workspace/restore-smoke.sh "${WEAVE_RESTORE_SMOKE_BACKUP_DIR}"

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker ps -a
          for container in weave-proxy weave-keycloak weave-backend weave-mas weave-synapse weave-nextcloud weave-db; do
            echo "--- ${container}"
            docker logs "${container}" || true
          done

      - name: Destroy stack
        if: always()
        run: bash weave-workspace/teardown.sh

  smoke-not-confirmed:
    name: Full Stack Smoke Not Started
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_power_budget_ok != true }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Full-stack smoke is manual-only and was not started. Re-run with confirm_power_budget_ok=true when solar/storage budget is acceptable."
